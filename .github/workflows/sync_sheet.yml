name: Sync Google Sheets Data

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:

      - uses: actions/checkout@v5
        with:
          ref: master

      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Run sync script
        timeout-minutes: 2
        run: python merge_sources.py

      - name: Create Pull Request
        id: cpr
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ github.token }}
          commit-message: "sync: ${{ github.run_id }}"
          committer: github-actions[bot] <github-actions[bot]@users.noreply.github.com>
          branch: automatic_sync
          base: master
          title: "sync: ${{ github.run_id }}"
          body: |
            Sincronización automática de fuentes de datos.
            Archivos actualizados:
            - `data_source_helper/plain_sources.json`
            - `js/data_source_json.js`
          add-paths: |
            data_source_helper/plain_sources.json
            js/data_source_json.js

      # Los PRs creados con GITHUB_TOKEN no disparan otros workflows
      # (pull_request/pull_request_target), por lo que el auto-merge se
      # activa aquí mismo en lugar de depender de un workflow separado.
      - name: Enable auto-merge
        if: steps.cpr.outputs.pull-request-number
        env:
          GH_TOKEN: ${{ github.token }}
          PR: ${{ steps.cpr.outputs.pull-request-number }}
          REPO: ${{ github.repository }}
        run: |
          gh pr merge "$PR" --repo "$REPO" --merge --auto \
            || gh pr merge "$PR" --repo "$REPO" --merge
