name: Auto-merge Sync PR

on:
  pull_request_target:
    types: [opened, synchronize]
    branches: [master]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    # Solo PRs de sincronización creados por el bot con el título esperado.
    if: >
      github.event.pull_request.head.ref == 'automatic_sync' &&
      github.event.pull_request.user.login == 'github-actions[bot]' &&
      startsWith(github.event.pull_request.title, 'sync: ')
    steps:
      - name: Enable native auto-merge
        env:
          GH_TOKEN: ${{ github.token }}
          PR: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          # Auto-merge nativo: GitHub mergea el PR cuando se cumplan los
          # requisitos (checks/reviews). Evita el 422 de "no puedes aprobar
          # tu propio PR" porque el bot ya no aprueba nada.
          # Fallback a merge directo si el repo no tiene "Allow auto-merge".
          gh pr merge "$PR" --repo "$REPO" --merge --auto \
            || gh pr merge "$PR" --repo "$REPO" --merge
