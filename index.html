<!doctype html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Directorio Venezuela</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/result-item.css" />
    <link rel="stylesheet" href="css/sidebar.css" />
    <link rel="stylesheet" href="css/sidebar-tag-button.css" />
    <link rel="stylesheet" href="css/tags-selected-zone.css" />
</head>
<body>
    <div class="fixed-top-wrapper">
        <header>
            <h1>Directorio de Sitios Web para Venezuela</h1>
            <button
                class="header__menu-button"
                aria-label="Abrir menú lateral"
                aria-expanded="false"
                aria-controls="sidebar-nav"
            >
                <svg aria-hidden="true" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
                     width="24" height="24" fill="none" stroke="currentColor"
                     stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="3" y1="6" x2="21" y2="6"></line>
                    <line x1="3" y1="12" x2="21" y2="12"></line>
                    <line x1="3" y1="18" x2="21" y2="18"></line>
                </svg>
            </button>
        </header>
        <div class="search-bar" role="search">
            <div class="search-bar__input-wrapper">
                <input
                    id="search-text-input"
                    type="search"
                    class="search-bar__input"
                    placeholder="Buscar sitios web"
                    aria-label="Buscar sitios web"
                    aria-busy="false"
                    autocomplete="off"
                />
                <svg class="search-bar__icon search-bar__icon--magnifier" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
                <svg class="search-bar__icon search-bar__icon--spinner" role="status" aria-label="Buscando" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10" stroke-dasharray="31.4 31.4" stroke-dashoffset="10"></circle>
                </svg>
            </div>
        </div>
        <section class="tags-selected-zone" id="tags-selected-zone" role="group" aria-label="Tags seleccionados" style="display: none;"></section>
    </div>

    <div class="fixed-top-spacer"></div>

    <main>
        <ul id="sites-list" aria-label="Directorio de sitios web" aria-live="polite">
            <!-- Tarjetas de sitios renderizadas dinámicamente -->
        </ul>
    </main>
    <footer>
        <p></p>
    </footer>

    <div class="sidebar-overlay" aria-hidden="true"></div>

    <nav id="sidebar-nav" class="sidebar" role="navigation"
         aria-label="Menú de navegación lateral" aria-hidden="true">
        <div class="sidebar__header">
            <button class="sidebar__close-button"
                    aria-label="Cerrar menú lateral">
                <svg aria-hidden="true" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
                     width="24" height="24" fill="none" stroke="currentColor"
                     stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
            </button>
        </div>

        <div class="sidebar__scrollable">
            <!-- Vacío en esta versión -->
        </div>

        <div class="sidebar__footer">
            <a href="https://github.com/kevinesaa/centraliza-ayuda-venezuela"
               target="_blank" rel="noopener noreferrer"
               class="sidebar__contribute-link"
               aria-label="Contribuir en GitHub (se abre en nueva pestaña)">
                <svg aria-hidden="true" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
                     width="20" height="20" fill="currentColor">
                    <path d="M12 0C5.37 0 0 5.37 0 12c0 5.3 3.438 9.8 8.205
                    11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04
                    -3.338.724-4.042-1.61-4.042-1.61-.546-1.385-1.335-1.755
                    -1.335-1.755-1.087-.744.084-.729.084-.729 1.205.084
                    1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305
                    3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466
                    -1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303
                    -.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267
                    1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552
                    3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765
                    .84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475
                    5.92.42.36.81 1.096.81 2.22 0 1.605-.015 2.896-.015
                    3.286 0 .315.21.69.825.57C20.565 21.795 24 17.295 24
                    12c0-6.63-5.37-12-12-12z"/>
                </svg>
                <span>Contribuir</span>
            </a>
            <p class="sidebar__contact">Contacto: kevin.esaa@gmail.com</p>
        </div>
    </nav>

    <script type="text/javascript" src="js/view.js"></script>
    <script type="text/javascript" src="js/tags_selected_zone.js"></script>
    <script type="text/javascript" src="js/search_text.js"></script>
    <script type="text/javascript" src="js/tag_item_view_builder.js"></script>
    <script type="text/javascript" src="js/side_bar.js"></script>
    <script type="text/javascript" src="js/data_source_json.js"></script>
    <script type="text/javascript" src="js/api_manager.js"></script>
    <script type="text/javascript" src="js/main.js"></script>
</body>
</html>
